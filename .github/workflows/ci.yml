name: CI

# Builds, tests (Windows + Linux), and publishes Sluice to GitHub Packages.
# Linux is load-bearing: it exercises the /dev/shm file-backed map + polling path.

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: dotnet restore Sluice.slnx
      - run: dotnet build Sluice.slnx -c Release --no-restore
      - run: dotnet test Sluice.slnx -c Release --no-build --verbosity normal

  concurrency-check:
    # Coyote takes over the scheduler and explores the ring's producer/consumer interleavings exhaustively,
    # proving no schedule loses, reorders, duplicates, or tears a message. Runs on net8.0 (the Coyote CLI host).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Install Coyote CLI
        run: dotnet tool install --global Microsoft.Coyote.CLI --version 1.7.11
      - name: Build · rewrite · systematic test
        run: bash scripts/run-coyote.sh 500
        shell: bash

  publish:
    needs: [test, concurrency-check]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0-ci.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi
      - name: Pack
        run: dotnet pack Sluice.slnx -c Release -o "${{ runner.temp }}/nupkg" -p:Version=${{ steps.ver.outputs.version }} -p:ContinuousIntegrationBuild=true
      - name: Add GitHub Packages source
        run: >
          dotnet nuget add source
          "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --name github --username ${{ github.repository_owner }}
          --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text
      - name: Push packages
        run: dotnet nuget push "${{ runner.temp }}/nupkg/*.nupkg" --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
